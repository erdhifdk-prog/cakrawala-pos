name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Initialize Capacitor
        run: |
          # Remove existing android dir if present
          rm -rf android
          
          # Initialize Capacitor
          npx cap init "Cakrawala POS" com.cakrawala.pos --web-dir public
          npx cap add android
          
          # Copy network security config
          mkdir -p android/app/src/main/res/xml
          cp network_security_config.xml android/app/src/main/res/xml/
          
          # Update AndroidManifest to use network security config
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' $MANIFEST

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug
          cd ..

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cakrawala-pos-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release (optional)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
